<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bm2-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8DFD0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bm2-bg)"/>
  <!-- Detail / fabric close-up view -->
  <g transform="translate(300, 400)">
    <!-- Large fabric drape -->
    <path d="M-250 -300 Q-200 -100 -150 50 Q-100 200 -80 350" fill="none" stroke="#C4A882" stroke-width="3" opacity="0.3"/>
    <path d="M-200 -300 Q-150 -80 -100 80 Q-50 220 -20 350" fill="none" stroke="#C4A882" stroke-width="2" opacity="0.25"/>
    <path d="M-150 -300 Q-100 -60 -50 100 Q0 240 30 350" fill="none" stroke="#C4A882" stroke-width="2" opacity="0.2"/>
    <path d="M-100 -300 Q-50 -40 0 120 Q40 250 70 350" fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.18"/>
    <path d="M-50 -300 Q0 -20 50 140 Q80 260 110 350" fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.15"/>
    <!-- Waist sash detail -->
    <rect x="-200" y="-20" width="400" height="40" rx="20" fill="#B8860B" opacity="0.12"/>
    <path d="M150 0 Q180 20 200 60 Q210 90 200 120" fill="none" stroke="#B8860B" stroke-width="2" opacity="0.2"/>
    <path d="M150 0 Q175 25 190 70 Q195 100 185 130" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.15"/>
    <!-- Organic cotton texture suggestion -->
    <circle cx="-80" cy="-120" r="40" fill="none" stroke="#8B6F47" stroke-width="0.3" opacity="0.1"/>
    <circle cx="60" cy="100" r="50" fill="none" stroke="#8B6F47" stroke-width="0.3" opacity="0.1"/>
    <circle cx="-40" cy="180" r="35" fill="none" stroke="#8B6F47" stroke-width="0.3" opacity="0.08"/>
  </g>
  <text x="300" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="5" fill="#8B6F47" opacity="0.5">FABRIC DETAIL</text>
  <text x="300" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="3" fill="#8B6F47" opacity="0.3">ORGANIC COTTON VOILE</text>
</svg>
