<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="terra-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4956B"/>
      <stop offset="40%" stop-color="#C67B4E"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
    <linearGradient id="terra-warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8A87C"/>
      <stop offset="100%" stop-color="#A0522D"/>
    </linearGradient>
    <pattern id="kente-mini" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Simplified kente-inspired weave -->
      <rect x="0" y="0" width="20" height="20" fill="#B8650A" opacity="0.08"/>
      <rect x="20" y="20" width="20" height="20" fill="#B8650A" opacity="0.08"/>
      <line x1="0" y1="10" x2="40" y2="10" stroke="#5C4033" stroke-width="0.3" opacity="0.1"/>
      <line x1="0" y1="30" x2="40" y2="30" stroke="#5C4033" stroke-width="0.3" opacity="0.1"/>
      <line x1="10" y1="0" x2="10" y2="40" stroke="#5C4033" stroke-width="0.3" opacity="0.1"/>
      <line x1="30" y1="0" x2="30" y2="40" stroke="#5C4033" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#terra-bg)"/>
  <rect width="800" height="1000" fill="url(#kente-mini)"/>

  <!-- Warm radial glow -->
  <circle cx="400" cy="350" r="350" fill="#E8A87C" opacity="0.08"/>

  <!-- Fashion silhouette - cocoon coat -->
  <g transform="translate(400, 170)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="34" ry="42" fill="#5C4033" opacity="0.7"/>
    <!-- Natural hair - afro silhouette -->
    <circle cx="0" cy="-15" r="50" fill="#3D2B1F" opacity="0.5"/>
    <circle cx="-15" cy="-25" r="30" fill="#3D2B1F" opacity="0.3"/>
    <circle cx="15" cy="-25" r="30" fill="#3D2B1F" opacity="0.3"/>
    <circle cx="0" cy="-35" r="28" fill="#3D2B1F" opacity="0.4"/>

    <!-- Neck -->
    <rect x="-8" y="38" width="16" height="20" fill="#8B5E3C" opacity="0.25" rx="8"/>

    <!-- Cocoon coat - voluminous shape -->
    <path d="M-20 55 Q-120 80 -150 150 Q-170 250 -160 380 Q-150 480 -140 580 Q-135 640 -120 700"
          fill="none" stroke="#5C4033" stroke-width="2.5" opacity="0.65"/>
    <path d="M20 55 Q120 80 150 150 Q170 250 160 380 Q150 480 140 580 Q135 640 120 700"
          fill="none" stroke="#5C4033" stroke-width="2.5" opacity="0.65"/>

    <!-- Coat fill - rich terracotta -->
    <path d="M-20 55 Q-120 80 -150 150 Q-170 250 -160 380 Q-150 480 -140 580 Q-135 640 -120 700
             L120 700 Q135 640 140 580 Q150 480 160 380 Q170 250 150 150 Q120 80 20 55 Z"
          fill="#C67B4E" opacity="0.25"/>

    <!-- Collar detail -->
    <path d="M-20 55 Q-30 50 -50 60 Q-40 80 -20 75" fill="none" stroke="#5C4033" stroke-width="1.5" opacity="0.5"/>
    <path d="M20 55 Q30 50 50 60 Q40 80 20 75" fill="none" stroke="#5C4033" stroke-width="1.5" opacity="0.5"/>

    <!-- Coat hem curve -->
    <path d="M-120 700 Q0 720 120 700" fill="none" stroke="#5C4033" stroke-width="1.5" opacity="0.4"/>

    <!-- Texture lines suggesting wool -->
    <path d="M-100 200 Q-80 205 -60 200" fill="none" stroke="#5C4033" stroke-width="0.5" opacity="0.15"/>
    <path d="M-110 280 Q-80 285 -50 280" fill="none" stroke="#5C4033" stroke-width="0.5" opacity="0.15"/>
    <path d="M-120 360 Q-85 365 -55 360" fill="none" stroke="#5C4033" stroke-width="0.5" opacity="0.15"/>
    <path d="M60 210 Q85 215 100 210" fill="none" stroke="#5C4033" stroke-width="0.5" opacity="0.15"/>
    <path d="M55 300 Q85 305 110 300" fill="none" stroke="#5C4033" stroke-width="0.5" opacity="0.15"/>
    <path d="M50 390 Q80 395 115 390" fill="none" stroke="#5C4033" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Decorative Kente-inspired border band -->
  <g transform="translate(0, 920)" opacity="0.3">
    <rect x="80" y="0" width="640" height="3" fill="#5C4033"/>
    <g>
      <rect x="80" y="8" width="30" height="15" fill="#B8860B" opacity="0.4" rx="1"/>
      <rect x="115" y="8" width="30" height="15" fill="#5C4033" opacity="0.3" rx="1"/>
      <rect x="150" y="8" width="30" height="15" fill="#B8860B" opacity="0.4" rx="1"/>
      <rect x="185" y="8" width="30" height="15" fill="#5C4033" opacity="0.3" rx="1"/>
      <rect x="575" y="8" width="30" height="15" fill="#5C4033" opacity="0.3" rx="1"/>
      <rect x="610" y="8" width="30" height="15" fill="#B8860B" opacity="0.4" rx="1"/>
      <rect x="645" y="8" width="30" height="15" fill="#5C4033" opacity="0.3" rx="1"/>
      <rect x="680" y="8" width="30" height="15" fill="#B8860B" opacity="0.4" rx="1"/>
    </g>
    <rect x="80" y="28" width="640" height="3" fill="#5C4033"/>
  </g>

  <!-- Collection title -->
  <text x="400" y="875" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="8" fill="#5C4033" opacity="0.7">TERRA NOVA</text>
  <text x="400" y="905" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#5C4033" opacity="0.4">SPRING / SUMMER 2025</text>
</svg>
