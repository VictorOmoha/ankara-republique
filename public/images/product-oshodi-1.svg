<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="os-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#151530"/>
    </linearGradient>
    <linearGradient id="os-ombre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e6b" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4a6fa5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1a3e" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#os-bg)"/>
  <!-- Midi skirt - A-line silhouette -->
  <g transform="translate(300, 80)">
    <!-- Waistband -->
    <path d="M-80 0 Q-85 5 -85 15 Q-85 25 -80 30 L80 30 Q85 25 85 15 Q85 5 80 0 Z"
          fill="#2c3e6b" opacity="0.25" stroke="#4a6fa5" stroke-width="1"/>
    <!-- A-line body -->
    <path d="M-80 30 Q-95 150 -115 300 Q-130 420 -140 530"
          fill="none" stroke="#4a6fa5" stroke-width="2" opacity="0.5"/>
    <path d="M80 30 Q95 150 115 300 Q130 420 140 530"
          fill="none" stroke="#4a6fa5" stroke-width="2" opacity="0.5"/>
    <!-- Fill with ombre -->
    <path d="M-80 30 Q-95 150 -115 300 Q-130 420 -140 530
             L140 530 Q130 420 115 300 Q95 150 80 30 Z"
          fill="url(#os-ombre)"/>
    <!-- Hem -->
    <path d="M-140 530 Q0 545 140 530" fill="none" stroke="#4a6fa5" stroke-width="1" opacity="0.35"/>
    <!-- Ombre layered dyeing effect -->
    <path d="M-90 100 Q0 95 90 100" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.12"/>
    <path d="M-100 180 Q0 175 100 180" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.15"/>
    <path d="M-110 260 Q0 255 110 260" fill="none" stroke="#4a6fa5" stroke-width="0.5" opacity="0.18"/>
    <path d="M-120 340 Q0 335 120 340" fill="none" stroke="#4a6fa5" stroke-width="0.5" opacity="0.2"/>
    <path d="M-130 420 Q0 415 130 420" fill="none" stroke="#4a6fa5" stroke-width="0.6" opacity="0.15"/>
    <!-- Indigo resist-dye circles -->
    <circle cx="-40" cy="200" r="25" fill="none" stroke="#4a6fa5" stroke-width="0.5" opacity="0.1"/>
    <circle cx="50" cy="350" r="30" fill="none" stroke="#4a6fa5" stroke-width="0.5" opacity="0.08"/>
    <circle cx="-60" cy="420" r="20" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.08"/>
    <!-- Mannequin legs below -->
    <line x1="-30" y1="530" x2="-35" y2="650" stroke="#4a6fa5" stroke-width="1" opacity="0.2"/>
    <line x1="30" y1="530" x2="35" y2="650" stroke="#4a6fa5" stroke-width="1" opacity="0.2"/>
  </g>
  <text x="300" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="5" fill="#4a6fa5" opacity="0.5">THE OSHODI MIDI SKIRT</text>
  <text x="300" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="3" fill="#4a6fa5" opacity="0.3">MIDNIGHT BLUE</text>
</svg>
