<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="indigo-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#1e2952"/>
      <stop offset="100%" stop-color="#0f1428"/>
    </linearGradient>
    <linearGradient id="indigo-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="100%" stop-color="#2c3e6b"/>
    </linearGradient>
    <pattern id="adire-pattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Adire resist-dye inspired pattern -->
      <circle cx="30" cy="30" r="12" fill="none" stroke="#4a6fa5" stroke-width="0.6" opacity="0.2"/>
      <circle cx="30" cy="30" r="6" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.15"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.1"/>
      <circle cx="60" cy="0" r="8" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.1"/>
      <circle cx="0" cy="60" r="8" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.1"/>
      <circle cx="60" cy="60" r="8" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.1"/>
      <line x1="0" y1="30" x2="18" y2="30" stroke="#4a6fa5" stroke-width="0.3" opacity="0.12"/>
      <line x1="42" y1="30" x2="60" y2="30" stroke="#4a6fa5" stroke-width="0.3" opacity="0.12"/>
      <line x1="30" y1="0" x2="30" y2="18" stroke="#4a6fa5" stroke-width="0.3" opacity="0.12"/>
      <line x1="30" y1="42" x2="30" y2="60" stroke="#4a6fa5" stroke-width="0.3" opacity="0.12"/>
    </pattern>
    <radialGradient id="indigo-glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#4a6fa5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0f1428" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#indigo-bg)"/>
  <rect width="800" height="1000" fill="url(#adire-pattern)"/>
  <rect width="800" height="1000" fill="url(#indigo-glow)"/>

  <!-- Fashion silhouette - structured blazer -->
  <g transform="translate(400, 180)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="35" ry="42" fill="#1a1a3e" stroke="#4a6fa5" stroke-width="1" opacity="0.8"/>
    <!-- Short hair / natural -->
    <path d="M-30 -15 Q-35 -40 -15 -48 Q0 -52 15 -48 Q35 -40 30 -15" fill="#0f1428" stroke="#4a6fa5" stroke-width="0.5" opacity="0.7"/>

    <!-- Neck -->
    <rect x="-7" y="38" width="14" height="25" fill="#2c3e6b" opacity="0.3" rx="7"/>

    <!-- Blazer silhouette -->
    <!-- Left lapel -->
    <path d="M-7 58 L-15 62 L-85 85 Q-100 92 -105 110 L-110 200 L-105 350 Q-100 420 -95 500 L-90 580"
          fill="none" stroke="#4a6fa5" stroke-width="2" opacity="0.7"/>
    <!-- Right lapel -->
    <path d="M7 58 L15 62 L85 85 Q100 92 105 110 L110 200 L105 350 Q100 420 95 500 L90 580"
          fill="none" stroke="#4a6fa5" stroke-width="2" opacity="0.7"/>

    <!-- Blazer fill -->
    <path d="M-85 85 Q-100 92 -105 110 L-110 200 L-105 350 Q-100 420 -95 500 L-90 580
             L90 580 Q100 420 105 350 L110 200 Q105 110 100 92 L85 85
             L15 62 L7 58 L-7 58 L-15 62 Z"
          fill="#1e2952" opacity="0.5"/>

    <!-- Lapel V-detail -->
    <path d="M-15 62 L-5 130 L0 140 L5 130 L15 62" fill="none" stroke="#4a6fa5" stroke-width="1.5" opacity="0.5"/>

    <!-- Single button -->
    <circle cx="0" cy="200" r="5" fill="none" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="200" r="2" fill="#4a6fa5" opacity="0.3"/>

    <!-- Pocket details -->
    <path d="M-60 280 L-20 275" fill="none" stroke="#4a6fa5" stroke-width="0.8" opacity="0.3"/>
    <path d="M20 275 L60 280" fill="none" stroke="#4a6fa5" stroke-width="0.8" opacity="0.3"/>

    <!-- Trouser lines below -->
    <line x1="-30" y1="580" x2="-35" y2="700" stroke="#4a6fa5" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="580" x2="35" y2="700" stroke="#4a6fa5" stroke-width="1.5" opacity="0.4"/>
    <line x1="-90" y1="580" x2="-100" y2="700" stroke="#4a6fa5" stroke-width="1.5" opacity="0.4"/>
    <line x1="90" y1="580" x2="100" y2="700" stroke="#4a6fa5" stroke-width="1.5" opacity="0.4"/>

    <!-- Adire texture on blazer -->
    <circle cx="-50" cy="180" r="20" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.15"/>
    <circle cx="50" cy="200" r="18" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.15"/>
    <circle cx="-30" cy="350" r="22" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.12"/>
    <circle cx="40" cy="380" r="16" fill="none" stroke="#4a6fa5" stroke-width="0.4" opacity="0.12"/>
  </g>

  <!-- Yoruba-inspired vertical border accents -->
  <g opacity="0.15">
    <rect x="50" y="80" width="2" height="840" fill="#4a6fa5"/>
    <rect x="748" y="80" width="2" height="840" fill="#4a6fa5"/>
    <!-- Vertical zigzag left -->
    <path d="M60 100 L70 115 L60 130 L70 145 L60 160 L70 175 L60 190 L70 205 L60 220" fill="none" stroke="#4a6fa5" stroke-width="0.8"/>
    <!-- Vertical zigzag right -->
    <path d="M740 100 L730 115 L740 130 L730 145 L740 160 L730 175 L740 190 L730 205 L740 220" fill="none" stroke="#4a6fa5" stroke-width="0.8"/>
  </g>

  <!-- Collection title -->
  <text x="400" y="880" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="8" fill="#4a6fa5" opacity="0.6">INDIGO CHRONICLES</text>
  <text x="400" y="910" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#4a6fa5" opacity="0.35">AUTUMN / WINTER 2025</text>
</svg>
