<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="ivory-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFEF9"/>
      <stop offset="50%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F0EBE0"/>
    </linearGradient>
    <linearGradient id="silk-sheen" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#F5F0E8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>
    <pattern id="lace-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#C4A882" opacity="0.15"/>
    </pattern>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#ivory-bg)"/>
  <rect width="800" height="1000" fill="url(#lace-dots)"/>

  <!-- Soft light rays -->
  <line x1="200" y1="0" x2="350" y2="1000" stroke="#C4A882" stroke-width="0.3" opacity="0.08"/>
  <line x1="400" y1="0" x2="450" y2="1000" stroke="#C4A882" stroke-width="0.3" opacity="0.08"/>
  <line x1="600" y1="0" x2="500" y2="1000" stroke="#C4A882" stroke-width="0.3" opacity="0.08"/>

  <!-- Fashion silhouette - ethereal floor-length gown -->
  <g transform="translate(400, 150)" filter="url(#soft-glow)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="32" ry="40" fill="#D4C4A8" opacity="0.4"/>
    <!-- Elegant updo -->
    <ellipse cx="0" cy="-20" rx="28" ry="25" fill="#8B6F47" opacity="0.25"/>
    <ellipse cx="5" cy="-30" rx="18" ry="15" fill="#8B6F47" opacity="0.2"/>

    <!-- Neck -->
    <rect x="-6" y="36" width="12" height="28" fill="#C4A882" opacity="0.15" rx="6"/>

    <!-- Gown - strapless with flowing silhouette -->
    <!-- Bodice -->
    <path d="M-70 68 Q-75 80 -72 110 Q-65 140 -55 160 Q-45 175 -40 190"
          fill="none" stroke="#C4A882" stroke-width="1.8" opacity="0.5"/>
    <path d="M70 68 Q75 80 72 110 Q65 140 55 160 Q45 175 40 190"
          fill="none" stroke="#C4A882" stroke-width="1.8" opacity="0.5"/>

    <!-- Bodice top - sweetheart neckline -->
    <path d="M-70 68 Q-50 58 -25 62 Q0 65 25 62 Q50 58 70 68"
          fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.45"/>

    <!-- Waist -->
    <path d="M-40 190 Q0 185 40 190" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.35"/>

    <!-- Flowing skirt -->
    <path d="M-40 190 Q-60 300 -90 420 Q-120 540 -160 680"
          fill="none" stroke="#C4A882" stroke-width="2" opacity="0.45"/>
    <path d="M40 190 Q60 300 100 420 Q130 540 170 680"
          fill="none" stroke="#C4A882" stroke-width="2" opacity="0.45"/>

    <!-- Gown fill - translucent -->
    <path d="M-70 68 Q-75 80 -72 110 Q-65 140 -55 160 Q-45 175 -40 190
             Q-60 300 -90 420 Q-120 540 -160 680
             L170 680 Q130 540 100 420 Q60 300 40 190
             Q45 175 55 160 Q65 140 72 110 Q75 80 70 68
             Q50 58 25 62 Q0 65 -25 62 Q-50 58 -70 68 Z"
          fill="#FAF7F2" opacity="0.3"/>
    <path d="M-70 68 Q-75 80 -72 110 Q-65 140 -55 160 Q-45 175 -40 190
             Q-60 300 -90 420 Q-120 540 -160 680
             L170 680 Q130 540 100 420 Q60 300 40 190
             Q45 175 55 160 Q65 140 72 110 Q75 80 70 68
             Q50 58 25 62 Q0 65 -25 62 Q-50 58 -70 68 Z"
          fill="url(#silk-sheen)"/>

    <!-- Train suggestion -->
    <path d="M-160 680 Q-100 700 0 710 Q100 700 170 680" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.3"/>
    <path d="M-140 680 Q-60 710 0 720 Q60 710 140 680" fill="none" stroke="#C4A882" stroke-width="0.5" opacity="0.2"/>

    <!-- Delicate fabric drape lines -->
    <path d="M-20 190 Q-40 350 -70 550" fill="none" stroke="#C4A882" stroke-width="0.4" opacity="0.2"/>
    <path d="M20 190 Q50 350 80 550" fill="none" stroke="#C4A882" stroke-width="0.4" opacity="0.2"/>
    <path d="M0 190 Q0 350 -10 550" fill="none" stroke="#C4A882" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- Decorative filigree corners -->
  <g opacity="0.12" stroke="#B8860B" fill="none" stroke-width="0.8">
    <!-- Top left -->
    <path d="M60 60 L60 120 M60 60 L120 60"/>
    <path d="M65 65 Q90 65 90 90 Q90 65 115 65" />
    <!-- Top right -->
    <path d="M740 60 L740 120 M740 60 L680 60"/>
    <path d="M735 65 Q710 65 710 90 Q710 65 685 65"/>
    <!-- Bottom left -->
    <path d="M60 940 L60 880 M60 940 L120 940"/>
    <path d="M65 935 Q90 935 90 910 Q90 935 115 935"/>
    <!-- Bottom right -->
    <path d="M740 940 L740 880 M740 940 L680 940"/>
    <path d="M735 935 Q710 935 710 910 Q710 935 685 935"/>
  </g>

  <!-- Collection title -->
  <text x="400" y="880" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="8" fill="#B8860B" opacity="0.45">IVORY ATELIER</text>
  <text x="400" y="910" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#B8860B" opacity="0.3">ATELIER COLLECTION</text>
</svg>
