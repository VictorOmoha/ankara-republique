<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="cl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#EDE6D8"/>
    </linearGradient>
    <linearGradient id="cl-silk" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8DFD0" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#cl-bg)"/>
  <!-- Cape silhouette — draped, flowing -->
  <g transform="translate(300, 120)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#D4C4A8" opacity="0.25"/>
    <!-- Hair pulled back -->
    <ellipse cx="0" cy="-12" rx="20" ry="18" fill="#8B6F47" opacity="0.15"/>
    <!-- Neck -->
    <rect x="-5" y="26" width="10" height="18" fill="#C4A882" opacity="0.1" rx="5"/>
    <!-- Cape - open front, draped -->
    <path d="M-15 42 Q-80 55 -140 100 Q-190 160 -200 280 Q-195 400 -170 500"
          fill="none" stroke="#C4A882" stroke-width="2" opacity="0.4"/>
    <path d="M15 42 Q80 55 140 100 Q190 160 200 280 Q195 400 170 500"
          fill="none" stroke="#C4A882" stroke-width="2" opacity="0.4"/>
    <!-- Cape fill -->
    <path d="M-15 42 Q-80 55 -140 100 Q-190 160 -200 280 Q-195 400 -170 500
             L170 500 Q195 400 200 280 Q190 160 140 100 Q80 55 15 42 Z"
          fill="url(#cl-silk)" opacity="0.6"/>
    <!-- Inner garment beneath cape -->
    <path d="M-35 48 Q-38 100 -36 200 Q-34 300 -35 400 Q-36 450 -35 520"
          fill="none" stroke="#C4A882" stroke-width="1" opacity="0.2"/>
    <path d="M35 48 Q38 100 36 200 Q34 300 35 400 Q36 450 35 520"
          fill="none" stroke="#C4A882" stroke-width="1" opacity="0.2"/>
    <!-- Cape drape folds -->
    <path d="M-80 100 Q-100 200 -120 350" fill="none" stroke="#C4A882" stroke-width="0.5" opacity="0.15"/>
    <path d="M-120 120 Q-140 220 -160 380" fill="none" stroke="#C4A882" stroke-width="0.5" opacity="0.12"/>
    <path d="M80 100 Q100 200 120 350" fill="none" stroke="#C4A882" stroke-width="0.5" opacity="0.15"/>
    <path d="M120 120 Q140 220 160 380" fill="none" stroke="#C4A882" stroke-width="0.5" opacity="0.12"/>
    <!-- Cape hem -->
    <path d="M-170 500 Q0 520 170 500" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.25"/>
    <!-- Clasp at neckline -->
    <circle cx="0" cy="42" r="5" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="42" r="2" fill="#B8860B" opacity="0.2"/>
  </g>
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="5" fill="#B8860B" opacity="0.45">THE CALABAR CAPE</text>
  <text x="300" y="760" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="3" fill="#B8860B" opacity="0.28">SOFT CREAM</text>
</svg>
