<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="ab-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFEF9"/>
      <stop offset="100%" stop-color="#F0EBE0"/>
    </linearGradient>
    <linearGradient id="ab-silk" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#F5F0E8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="ab-lace" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.6" fill="#C4A882" opacity="0.1"/>
    </pattern>
    <filter id="ab-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#ab-bg)"/>
  <rect width="600" height="800" fill="url(#ab-lace)"/>
  <!-- Ethereal gown silhouette -->
  <g transform="translate(300, 90)" filter="url(#ab-glow)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="25" ry="32" fill="#D4C4A8" opacity="0.3"/>
    <!-- Elegant updo -->
    <ellipse cx="0" cy="-15" rx="22" ry="20" fill="#8B6F47" opacity="0.18"/>
    <ellipse cx="5" cy="-25" rx="14" ry="12" fill="#8B6F47" opacity="0.12"/>
    <!-- Necklace suggestion -->
    <path d="M-15 28 Q0 35 15 28" fill="none" stroke="#B8860B" stroke-width="0.6" opacity="0.3"/>
    <!-- Strapless bodice -->
    <path d="M-55 50 Q-40 42 -18 45 Q0 48 18 45 Q40 42 55 50"
          fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.4"/>
    <path d="M-55 50 Q-58 65 -55 85 Q-48 105 -38 120"
          fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.4"/>
    <path d="M55 50 Q58 65 55 85 Q48 105 38 120"
          fill="none" stroke="#C4A882" stroke-width="1.5" opacity="0.4"/>
    <!-- Natural waist -->
    <path d="M-38 120 Q0 115 38 120" fill="none" stroke="#C4A882" stroke-width="0.8" opacity="0.3"/>
    <!-- Flowing floor-length skirt -->
    <path d="M-38 120 Q-60 250 -90 400 Q-120 530 -160 660"
          fill="none" stroke="#C4A882" stroke-width="1.8" opacity="0.4"/>
    <path d="M38 120 Q60 250 95 400 Q125 530 165 660"
          fill="none" stroke="#C4A882" stroke-width="1.8" opacity="0.4"/>
    <!-- Gown fill -->
    <path d="M-55 50 Q-58 65 -55 85 Q-48 105 -38 120
             Q-60 250 -90 400 Q-120 530 -160 660
             L165 660 Q125 530 95 400 Q60 250 38 120
             Q48 105 55 85 Q58 65 55 50
             Q40 42 18 45 Q0 48 -18 45 Q-40 42 -55 50 Z"
          fill="#FAF7F2" opacity="0.2"/>
    <path d="M-55 50 Q-58 65 -55 85 Q-48 105 -38 120
             Q-60 250 -90 400 Q-120 530 -160 660
             L165 660 Q125 530 95 400 Q60 250 38 120
             Q48 105 55 85 Q58 65 55 50
             Q40 42 18 45 Q0 48 -18 45 Q-40 42 -55 50 Z"
          fill="url(#ab-silk)"/>
    <!-- Train -->
    <path d="M-160 660 Q-80 680 0 690 Q80 680 165 660" fill="none" stroke="#C4A882" stroke-width="0.8" opacity="0.25"/>
    <path d="M-130 660 Q-40 690 0 695 Q40 690 130 660" fill="none" stroke="#C4A882" stroke-width="0.4" opacity="0.15"/>
    <!-- Drape lines -->
    <path d="M-15 120 Q-30 300 -60 500" fill="none" stroke="#C4A882" stroke-width="0.3" opacity="0.15"/>
    <path d="M0 120 Q0 300 -10 500" fill="none" stroke="#C4A882" stroke-width="0.3" opacity="0.12"/>
    <path d="M15 120 Q30 300 60 500" fill="none" stroke="#C4A882" stroke-width="0.3" opacity="0.15"/>
    <!-- Hand-finished detail dots along bodice -->
    <circle cx="-30" cy="70" r="1" fill="#B8860B" opacity="0.15"/>
    <circle cx="-15" cy="65" r="1" fill="#B8860B" opacity="0.15"/>
    <circle cx="0" cy="63" r="1" fill="#B8860B" opacity="0.15"/>
    <circle cx="15" cy="65" r="1" fill="#B8860B" opacity="0.15"/>
    <circle cx="30" cy="70" r="1" fill="#B8860B" opacity="0.15"/>
  </g>
  <!-- Atelier badge -->
  <rect x="40" y="40" width="130" height="24" rx="2" fill="#B8860B" opacity="0.12"/>
  <text x="105" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="8" letter-spacing="3" fill="#B8860B" opacity="0.6">ATELIER EXCLUSIVE</text>
  <text x="300" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="5" fill="#B8860B" opacity="0.45">THE ABUJA GOWN</text>
  <text x="300" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="3" fill="#B8860B" opacity="0.28">PEARL IVORY</text>
</svg>
