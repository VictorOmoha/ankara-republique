<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="ac-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C67B4E"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
    <pattern id="ac-weave" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="12" height="12" fill="#A0522D" opacity="0.08"/>
      <rect x="12" y="12" width="12" height="12" fill="#A0522D" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#ac-bg)"/>
  <rect width="600" height="800" fill="url(#ac-weave)"/>
  <!-- Cocoon coat on figure -->
  <g transform="translate(300, 100)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="28" ry="35" fill="#5C4033" opacity="0.5"/>
    <!-- Afro -->
    <circle cx="0" cy="-15" r="42" fill="#3D2B1F" opacity="0.35"/>
    <circle cx="-12" cy="-22" r="25" fill="#3D2B1F" opacity="0.25"/>
    <circle cx="12" cy="-22" r="25" fill="#3D2B1F" opacity="0.25"/>
    <!-- Neck -->
    <rect x="-6" y="32" width="12" height="18" fill="#8B5E3C" opacity="0.15" rx="6"/>
    <!-- Cocoon coat — voluminous -->
    <path d="M-15 48 Q-110 70 -135 140 Q-155 240 -145 370 Q-138 460 -130 550 Q-125 600 -110 650"
          fill="none" stroke="#5C4033" stroke-width="2.5" opacity="0.55"/>
    <path d="M15 48 Q110 70 135 140 Q155 240 145 370 Q138 460 130 550 Q125 600 110 650"
          fill="none" stroke="#5C4033" stroke-width="2.5" opacity="0.55"/>
    <!-- Fill -->
    <path d="M-15 48 Q-110 70 -135 140 Q-155 240 -145 370 Q-138 460 -130 550 Q-125 600 -110 650
             L110 650 Q125 600 130 550 Q138 460 145 370 Q155 240 135 140 Q110 70 15 48 Z"
          fill="#B86B3A" opacity="0.2"/>
    <!-- Large collar -->
    <path d="M-15 48 Q-25 42 -45 48 Q-35 65 -15 60" fill="none" stroke="#5C4033" stroke-width="2" opacity="0.4"/>
    <path d="M15 48 Q25 42 45 48 Q35 65 15 60" fill="none" stroke="#5C4033" stroke-width="2" opacity="0.4"/>
    <!-- Hem -->
    <path d="M-110 650 Q0 665 110 650" fill="none" stroke="#5C4033" stroke-width="1.5" opacity="0.35"/>
    <!-- Wool texture suggestion -->
    <path d="M-90 200 Q-70 205 -50 200" fill="none" stroke="#5C4033" stroke-width="0.4" opacity="0.12"/>
    <path d="M-100 300 Q-75 305 -50 300" fill="none" stroke="#5C4033" stroke-width="0.4" opacity="0.12"/>
    <path d="M60 250 Q85 255 100 250" fill="none" stroke="#5C4033" stroke-width="0.4" opacity="0.12"/>
    <path d="M50 400 Q80 405 105 400" fill="none" stroke="#5C4033" stroke-width="0.4" opacity="0.1"/>
  </g>
  <!-- Limited edition badge area -->
  <rect x="40" y="40" width="120" height="24" rx="2" fill="#5C4033" opacity="0.4"/>
  <text x="100" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="8" letter-spacing="3" fill="#E8A87C" opacity="0.8">LIMITED EDITION</text>
  <text x="300" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="5" fill="#5C4033" opacity="0.6">THE ACCRA COCOON COAT</text>
  <text x="300" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="3" fill="#5C4033" opacity="0.35">TERRACOTTA</text>
</svg>
