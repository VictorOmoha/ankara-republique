<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="basalt-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B6B6B"/>
      <stop offset="40%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <pattern id="herringbone" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M0 16 L8 0 L16 16 L8 32 Z" fill="none" stroke="#888" stroke-width="0.4" opacity="0.12"/>
      <path d="M16 16 L24 0 L32 16 L24 32 Z" fill="none" stroke="#888" stroke-width="0.4" opacity="0.12"/>
      <line x1="0" y1="8" x2="32" y2="8" stroke="#777" stroke-width="0.2" opacity="0.08"/>
      <line x1="0" y1="24" x2="32" y2="24" stroke="#777" stroke-width="0.2" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#basalt-bg)"/>
  <rect width="800" height="1000" fill="url(#herringbone)"/>

  <!-- Subtle warm glow -->
  <circle cx="400" cy="350" r="300" fill="#C4A882" opacity="0.04"/>

  <!-- Fashion silhouette - structured overcoat -->
  <g transform="translate(400, 160)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="32" ry="40" fill="#3A3A3A" opacity="0.7"/>
    <!-- Short structured hair -->
    <ellipse cx="0" cy="-18" rx="36" ry="30" fill="#1A1A1A" opacity="0.5"/>
    <ellipse cx="0" cy="-25" rx="30" ry="22" fill="#1A1A1A" opacity="0.4"/>

    <!-- Neck -->
    <rect x="-7" y="36" width="14" height="20" fill="#4A4A4A" opacity="0.25" rx="7"/>

    <!-- Overcoat - structured, long -->
    <path d="M-18 53 Q-90 70 -115 140 Q-130 230 -125 350 Q-120 450 -115 550 Q-112 620 -105 700"
          fill="none" stroke="#1A1A1A" stroke-width="2.5" opacity="0.6"/>
    <path d="M18 53 Q90 70 115 140 Q130 230 125 350 Q120 450 115 550 Q112 620 105 700"
          fill="none" stroke="#1A1A1A" stroke-width="2.5" opacity="0.6"/>

    <!-- Coat fill -->
    <path d="M-18 53 Q-90 70 -115 140 Q-130 230 -125 350 Q-120 450 -115 550 Q-112 620 -105 700
             L105 700 Q112 620 115 550 Q120 450 125 350 Q130 230 115 140 Q90 70 18 53 Z"
          fill="#3A3A3A" opacity="0.25"/>

    <!-- Lapel details -->
    <path d="M-18 53 Q-28 48 -50 58 Q-42 90 -30 100 L-12 75" fill="none" stroke="#1A1A1A" stroke-width="1.8" opacity="0.5"/>
    <path d="M18 53 Q28 48 50 58 Q42 90 30 100 L12 75" fill="none" stroke="#1A1A1A" stroke-width="1.8" opacity="0.5"/>

    <!-- Center seam -->
    <line x1="0" y1="75" x2="0" y2="700" stroke="#1A1A1A" stroke-width="0.8" opacity="0.2"/>

    <!-- Button suggestions -->
    <circle cx="0" cy="180" r="3" fill="#1A1A1A" opacity="0.2"/>
    <circle cx="0" cy="260" r="3" fill="#1A1A1A" opacity="0.2"/>
    <circle cx="0" cy="340" r="3" fill="#1A1A1A" opacity="0.2"/>

    <!-- Hem -->
    <path d="M-105 700 Q0 718 105 700" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.4"/>

    <!-- Wool texture lines -->
    <path d="M-85 200 Q-65 205 -45 200" fill="none" stroke="#1A1A1A" stroke-width="0.4" opacity="0.12"/>
    <path d="M-95 300 Q-70 305 -45 300" fill="none" stroke="#1A1A1A" stroke-width="0.4" opacity="0.12"/>
    <path d="M-100 400 Q-70 405 -45 400" fill="none" stroke="#1A1A1A" stroke-width="0.4" opacity="0.12"/>
    <path d="M50 220 Q75 225 95 220" fill="none" stroke="#1A1A1A" stroke-width="0.4" opacity="0.12"/>
    <path d="M45 320 Q75 325 100 320" fill="none" stroke="#1A1A1A" stroke-width="0.4" opacity="0.12"/>
    <path d="M40 420 Q70 425 100 420" fill="none" stroke="#1A1A1A" stroke-width="0.4" opacity="0.12"/>
  </g>

  <!-- Decorative border band -->
  <g transform="translate(0, 920)" opacity="0.3">
    <rect x="80" y="0" width="640" height="2" fill="#888"/>
    <g>
      <rect x="80" y="7" width="30" height="14" fill="#C4A882" opacity="0.35" rx="1"/>
      <rect x="115" y="7" width="30" height="14" fill="#4A4A4A" opacity="0.4" rx="1"/>
      <rect x="150" y="7" width="30" height="14" fill="#C4A882" opacity="0.35" rx="1"/>
      <rect x="185" y="7" width="30" height="14" fill="#4A4A4A" opacity="0.4" rx="1"/>
      <rect x="575" y="7" width="30" height="14" fill="#4A4A4A" opacity="0.4" rx="1"/>
      <rect x="610" y="7" width="30" height="14" fill="#C4A882" opacity="0.35" rx="1"/>
      <rect x="645" y="7" width="30" height="14" fill="#4A4A4A" opacity="0.4" rx="1"/>
      <rect x="680" y="7" width="30" height="14" fill="#C4A882" opacity="0.35" rx="1"/>
    </g>
    <rect x="80" y="26" width="640" height="2" fill="#888"/>
  </g>

  <!-- Collection title -->
  <text x="400" y="875" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="8" fill="#C4A882" opacity="0.7">BASALT WEAVES</text>
  <text x="400" y="905" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#888" opacity="0.4">AUTUMN / WINTER 2026</text>
</svg>
