<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="sahel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DFD0"/>
      <stop offset="40%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#C4A882"/>
    </linearGradient>
    <linearGradient id="sahel-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A847"/>
      <stop offset="100%" stop-color="#8B6F47"/>
    </linearGradient>
    <pattern id="sahel-dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#8B6F47" opacity="0.15"/>
    </pattern>
    <clipPath id="sahel-circle">
      <circle cx="400" cy="420" r="250"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#sahel-bg)"/>
  <rect width="800" height="1000" fill="url(#sahel-dots)"/>

  <!-- Desert horizon lines -->
  <path d="M0 650 Q200 600 400 630 Q600 660 800 620" fill="none" stroke="#C4A882" stroke-width="0.8" opacity="0.4"/>
  <path d="M0 680 Q250 650 500 670 Q700 690 800 660" fill="none" stroke="#C4A882" stroke-width="0.6" opacity="0.3"/>
  <path d="M0 710 Q300 690 550 700 Q750 710 800 695" fill="none" stroke="#C4A882" stroke-width="0.5" opacity="0.2"/>

  <!-- Central fashion silhouette - flowing dress form -->
  <g transform="translate(400, 200)">
    <!-- Head/hair -->
    <ellipse cx="0" cy="0" rx="38" ry="45" fill="#5C4033" opacity="0.85"/>
    <ellipse cx="0" cy="-10" rx="42" ry="35" fill="#5C4033" opacity="0.6"/>
    <!-- Head wrap / gele -->
    <path d="M-35 -20 Q-45 -50 -20 -55 Q0 -60 20 -55 Q45 -50 35 -20" fill="#C4A882" stroke="#8B6F47" stroke-width="1"/>
    <path d="M-30 -25 Q-38 -48 -15 -52 Q0 -55 15 -52 Q38 -48 30 -25" fill="#D4A847" opacity="0.5"/>

    <!-- Neck -->
    <rect x="-8" y="40" width="16" height="30" fill="#8B6F47" opacity="0.3" rx="8"/>

    <!-- Shoulders -->
    <path d="M-8 65 Q-80 70 -100 90" fill="none" stroke="#5C4033" stroke-width="2" opacity="0.6"/>
    <path d="M8 65 Q80 70 100 90" fill="none" stroke="#5C4033" stroke-width="2" opacity="0.6"/>

    <!-- Flowing wrap dress silhouette -->
    <path d="M-100 90 Q-95 120 -90 200 Q-85 300 -100 400 Q-115 500 -130 580"
          fill="none" stroke="#5C4033" stroke-width="2.5" opacity="0.7"/>
    <path d="M100 90 Q95 120 90 200 Q85 300 80 400 Q75 500 70 580"
          fill="none" stroke="#5C4033" stroke-width="2.5" opacity="0.7"/>

    <!-- Dress body fill -->
    <path d="M-100 90 Q-95 120 -90 200 Q-85 300 -100 400 Q-115 500 -130 580
             L130 580 Q95 500 80 400 Q85 300 90 200 Q95 120 100 90 Z"
          fill="#E8DFD0" opacity="0.6"/>
    <path d="M-100 90 Q-95 120 -90 200 Q-85 300 -100 400 Q-115 500 -130 580
             L130 580 Q95 500 80 400 Q85 300 90 200 Q95 120 100 90 Z"
          fill="url(#sahel-gold)" opacity="0.15"/>

    <!-- Wrap detail -->
    <path d="M-20 90 Q-60 200 -40 350 Q-20 500 -80 580" fill="none" stroke="#8B6F47" stroke-width="1.5" opacity="0.4" stroke-dasharray="8 4"/>

    <!-- Waist sash -->
    <path d="M-85 240 Q-40 230 0 235 Q40 240 85 235" fill="none" stroke="#B8860B" stroke-width="3" opacity="0.5"/>
    <path d="M60 235 Q80 250 95 280" fill="none" stroke="#B8860B" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- African geometric border pattern - top -->
  <g opacity="0.2">
    <rect x="60" y="60" width="680" height="2" fill="#8B6F47"/>
    <rect x="60" y="66" width="680" height="1" fill="#8B6F47"/>
    <!-- Diamond pattern -->
    <g transform="translate(60, 40)">
      <polygon points="10,0 20,10 10,20 0,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="50,0 60,10 50,20 40,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="90,0 100,10 90,20 80,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="130,0 140,10 130,20 120,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="170,0 180,10 170,20 160,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="540,0 550,10 540,20 530,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="580,0 590,10 580,20 570,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="620,0 630,10 620,20 610,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="660,0 670,10 660,20 650,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
      <polygon points="700,0 710,10 700,20 690,10" fill="none" stroke="#8B6F47" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Collection title -->
  <text x="400" y="880" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="8" fill="#8B6F47" opacity="0.6">SAHEL SILHOUETTES</text>
  <text x="400" y="910" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#8B6F47" opacity="0.35">RESORT 2025</text>

  <!-- Bottom border -->
  <rect x="60" y="940" width="680" height="1" fill="#8B6F47" opacity="0.2"/>
  <rect x="60" y="945" width="680" height="2" fill="#8B6F47" opacity="0.15"/>
</svg>
